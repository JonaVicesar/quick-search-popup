<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Quick Search Popup</title>
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <form id="searchForm" autocomplete="off">
      <input type="text" id="searchingText" placeholder="Search..." autofocus />
      <select id="engine">
        <option value="google">Google</option>
        <option value="duckduckgo">DuckDuckGo</option>
      </select>
    </form>
    <div class="hint">Enter to search in popup · Esc to close</div>
    <script src="popup.js"></script>
  </body>
</html>
