<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Quick Search Popup</title>
    <style>
      :root {
        color-scheme: dark light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        width: 380px;
        padding: 14px;
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #1c1c22;
        color: #eee;
      }
      #searchForm {
        display: flex;
        gap: 8px;
      }
      #searchingText {
        flex: 1;
        padding: 10px 12px;
        font-size: 15px;
        border-radius: 8px;
        border: 1px solid #444;
        background: #2a2a32;
        color: #fff;
        outline: none;
      }
      #searchingText:focus {
        border-color: #6a8dff;
      }
      select {
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #444;
        background: #2a2a32;
        color: #fff;
      }
      .hint {
        margin-top: 8px;
        font-size: 12px;
        color: #888;
      }
    </style>
  </head>

  <body>
    <form id="searchForm" autocomplete="off">
      <input type="text" id="searchingText" placeholder="Search..." autofocus />
      <select id="engine">
        <option value="google">Google</option>
        <option value="duckduckgo">DuckDuckGo</option>
      </select>
    </form>
    <div class="hint">Enter to search in popup · Esc to close</div>
    <script src="popup.js"></script>
  </body>
</html>
